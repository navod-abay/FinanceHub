name: Deploy Server to Proxmox VM

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: financehub-server
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Build and Deploy Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_TAILSCALE_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to Proxmox VM
        env:
          VM_IP: ${{ secrets.VM_TAILSCALE_IP }}
          VM_USER: ${{ secrets.VM_SSH_USER }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}
        run: |
          ssh ${VM_USER}@${VM_IP} << 'ENDSSH'
            set -e
            
            # Navigate to application directory
            cd ~/financehub-server || exit 1
            
            # Pull the new image
            echo "Pulling new Docker image..."
            docker pull ${{ env.IMAGE_TAG }}
            
            # Tag as latest for docker-compose
            docker tag ${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:latest
            
            # Stop and remove old container
            echo "Stopping old container..."
            docker-compose -f docker-compose.prod.yml down || true
            
            # Start new container
            echo "Starting new container..."
            docker-compose -f docker-compose.prod.yml up -d
            
            # Wait for containers to be healthy
            echo "Waiting for containers to be healthy..."
            sleep 5
            
            # Clean up old images (keep last 3)
            echo "Cleaning up old images..."
            docker images ${{ env.IMAGE_NAME }} --format "{{.ID}}" | tail -n +4 | xargs -r docker rmi || true
            
            echo "Deployment completed successfully!"
          ENDSSH

      - name: Health Check
        env:
          VM_IP: ${{ secrets.VM_TAILSCALE_IP }}
        run: |
          echo "Waiting for application to start..."
          sleep 10
          
          echo "Performing health check..."
          for i in {1..5}; do
            if curl -f http://${VM_IP}:8000/health > /dev/null 2>&1; then
              echo "✓ Health check passed!"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 5
          done
          
          echo "✗ Health check failed after 5 attempts"
          exit 1

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Deployment successful!"
            echo "Deployed commit: ${{ github.sha }}"
            echo "Image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}"
          else
            echo "❌ Deployment failed!"
          fi





