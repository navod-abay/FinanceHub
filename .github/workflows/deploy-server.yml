name: Deploy Server to Proxmox VM

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Proxmox VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VM_TAILSCALE_IP }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: REPO_URL,BRANCH,COMMIT_SHA
          script: |
            set -e
            
            # Navigate to application directory
            cd ~/financehub-server || exit 1
            
            # Pull latest code
            echo "Pulling latest code from repository..."
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/${BRANCH}
            else
              git clone ${REPO_URL} .
              git checkout ${BRANCH}
            fi
            
            echo "Deployed commit: ${COMMIT_SHA}"
            
            # Stop old containers
            echo "Stopping old containers..."
            docker-compose -f docker-compose.prod.yml down || true
            
            # Build and start containers
            echo "Building and starting containers..."
            docker-compose -f docker-compose.prod.yml up -d --build
            
            # Wait for containers to be healthy
            echo "Waiting for containers to be healthy..."
            sleep 10
            
            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -f
            
            echo "Deployment completed successfully!"

      - name: Health Check
        env:
          VM_IP: ${{ secrets.VM_TAILSCALE_IP }}
        run: |
          echo "Waiting for application to start..."
          sleep 10
          
          echo "Performing health check..."
          for i in {1..5}; do
            if curl -f http://${VM_IP}:8000/health > /dev/null 2>&1; then
              echo "✓ Health check passed!"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 5
          done
          
          echo "✗ Health check failed after 5 attempts"
          exit 1

      - name: Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🚀 Deployment successful!"
            echo "Deployed commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
          else
            echo "❌ Deployment failed!"
          fi





