version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: financehub-server:latest
    container_name: financehub-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://financehub_user:financehub@db:5432/financehub}
      - HOST=${HOST:-0.0.0.0}
      - PORT=${PORT:-8000}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./data:/app/data
      - ./db_init:/app/db_init:ro
    depends_on:
      - db
    networks:
      - financehub-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15-alpine
    container_name: financehub-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-financehub_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-financehub}
      - POSTGRES_DB=${POSTGRES_DB:-financehub}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d:ro
    networks:
      - financehub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financehub_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  financehub-network:
    driver: bridge

volumes:
  postgres-data:
